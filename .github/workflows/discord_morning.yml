name: Discord Morning SOX Protocol

on:
  schedule:
    - cron: '0 23 * * *'   # JST 08:00 朝プロトコル
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install discord.py
          pip install yfinance
          pip install pandas
          pip install numpy
          pip install requests
          pip install pytz

      - name: Run Discord morning protocol
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          INPUT_CHANNEL_ID: ${{ vars.INPUT_CHANNEL_ID }}
          OUTPUT_CHANNEL_ID: ${{ vars.OUTPUT_CHANNEL_ID }}
        run: python discord_morning_bot.py
