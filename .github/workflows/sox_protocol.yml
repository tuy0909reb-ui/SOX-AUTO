name: SOX PROTOCOL v2

on:
  # 日本時間08時に自動実行（UTC 23時、前日）
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
  # 手動実行ボタン（Run workflow）を有効化
  workflow_dispatch:

jobs:
  run-python:
    if: github.event_name != 'schedule' || github.event.schedule == '0 23 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance
          pip install pandas
          pip install numpy
          pip install requests
          pip install pytz

      - name: Run SOX PROTOCOL
        env:
          SOX_MOTOMOTO: ${{ secrets.SOX_MOTOMOTO }}
          SOX_HYOKA: ${{ secrets.SOX_HYOKA }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python sox_protocol.py

      - name: Upload morning baseline for PM protocol
        uses: actions/upload-artifact@v4
        with:
          name: morning-input
          path: morning_input.json
          retention-days: 1

      - name: Run SILICON PROTOCOL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python silicon_protocol.py

  silicon_midday_check:
    if: github.event_name != 'schedule' || github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance
          pip install pandas
          pip install numpy
          pip install requests
          pip install pytz

      - name: Run SILICON PROTOCOL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python silicon_protocol.py
